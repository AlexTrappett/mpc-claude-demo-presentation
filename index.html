<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VERY VERY COOL DEMO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1 class="title">VERY VERY COOL DEMO</h1>

    <section class="chassis">
      <div class="pad-grid" role="group" aria-label="Drum pad grid">
        <button type="button" class="pad" data-key="1">1</button>
        <button type="button" class="pad" data-key="2">2</button>
        <button type="button" class="pad" data-key="3">3</button>
        <button type="button" class="pad" data-key="4">4</button>
        <button type="button" class="pad" data-key="Q">Q</button>
        <button type="button" class="pad" data-key="W">W</button>
        <button type="button" class="pad" data-key="E">E</button>
        <button type="button" class="pad" data-key="R">R</button>
        <button type="button" class="pad" data-key="A">A</button>
        <button type="button" class="pad" data-key="S">S</button>
        <button type="button" class="pad" data-key="D">D</button>
        <button type="button" class="pad" data-key="F">F</button>
        <button type="button" class="pad" data-key="Z">Z</button>
        <button type="button" class="pad" data-key="X">X</button>
        <button type="button" class="pad" data-key="C">C</button>
        <button type="button" class="pad" data-key="V">V</button>
      </div>
    </section>

    <section class="legend">
      <p class="legend-hint">Press the keys on your keyboard or click the pads to play sounds.</p>
      <div class="keymap" aria-hidden="true">
        <span class="keycap">1</span>
        <span class="keycap">2</span>
        <span class="keycap">3</span>
        <span class="keycap">4</span>
        <span class="keycap">Q</span>
        <span class="keycap">W</span>
        <span class="keycap">E</span>
        <span class="keycap">R</span>
        <span class="keycap">A</span>
        <span class="keycap">S</span>
        <span class="keycap">D</span>
        <span class="keycap">F</span>
        <span class="keycap">Z</span>
        <span class="keycap">X</span>
        <span class="keycap">C</span>
        <span class="keycap">V</span>
      </div>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
